<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Salas ng Karunungan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ph-blue: #0038a8; --ph-red: #ce1126; --ph-gold: #fcd116; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--ph-blue); padding-bottom: 15px; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; color: var(--ph-blue); font-size: 1.5rem; }

        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; border-top: 5px solid var(--ph-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.75rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.4rem; font-weight: 700; color: var(--ph-blue); }

        /* Filters */
        .filter-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; }
        input[type="date"] { padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; width: 100%; }
        .btn-reset { background: #6c757d; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; flex: 1; min-width: 140px; }

        /* Mobile Friendly Table */
        table { width: 100%; border-collapse: collapse; }
        thead { display: table-header-group; }
        th { background: var(--ph-blue); color: white; padding: 12px; text-align: left; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .receipt-preview { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border-radius: 4px; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d4edda; color: #155724; }
        
        .btn-action { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; width: 100%; margin-bottom: 5px; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }

        /* Tablet & Mobile Table Breakpoint */
        @media screen and (max-width: 768px) {
            thead { display: none; } /* Itago ang header sa mobile */
            tr { display: block; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; background: #fff; }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 8px 0; text-align: right; }
            td::before { content: attr(data-label); font-weight: 700; color: var(--ph-blue); text-align: left; font-size: 0.8rem; }
            td:last-child { border-bottom: none; flex-direction: column; gap: 5px; }
            .receipt-preview { width: 100px; height: 60px; }
        }

        #imgModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); padding: 20px; box-sizing: border-box; }
        #fullImg { max-width: 100%; max-height: 90%; object-fit: contain; margin-top: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-flex">
        <h1>Dashboard ni Ma'am April</h1>
        <div id="currentDate" style="font-size: 0.8rem; color: #666;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Benta</h3>
            <p id="totalSales">₱0</p>
        </div>
        <div class="stat-card">
            <h3>Approved</h3>
            <p id="approvedCount">0</p>
        </div>
        <div class="stat-card" style="border-top-color: var(--ph-red);">
            <h3>Pending</h3>
            <p id="pendingCount">0</p>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group"><label>Mula:</label><input type="date" id="startDate"></div>
        <div class="filter-group"><label>Hanggang:</label><input type="date" id="endDate"></div>
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Petsa</th>
                <th>Email</th>
                <th>Item</th>
                <th>Halaga</th>
                <th>Resibo</th>
                <th>Status</th>
                <th>Aksyon</th>
            </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
    </table>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <img id="fullImg" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFAYSZFOqIcpt5fsLG7HZrA7PXTAdiUEE",
        authDomain: "teacher-2a27f.firebaseapp.com",
        projectId: "teacher-2a27f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const priceList = { "Ibong Adarna Guide": 150, "Florante at Laura Guide": 200, "Gramatika Module": 120 };
    let allOrders = [];

    onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snapshot) => {
        allOrders = [];
        snapshot.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
        renderTable(allOrders);
    });

    function renderTable(orders) {
        const body = document.getElementById('ordersBody');
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        body.innerHTML = "";
        let total = 0, approved = 0, pending = 0;

        orders.forEach(order => {
            const date = order.timestamp ? new Date(order.timestamp.seconds * 1000) : new Date();
            const dateStr = date.toISOString().split('T')[0];
            const price = priceList[order.productName] || 0;

            if (start && dateStr < start) return;
            if (end && dateStr > end) return;

            if (order.status === 'approved') { total += price; approved++; }
            else if (order.status === 'pending') { pending++; }

            body.innerHTML += `
                <tr>
                    <td data-label="Petsa">${date.toLocaleDateString()}</td>
                    <td data-label="Email">${order.customerEmail}</td>
                    <td data-label="Item">${order.productName}</td>
                    <td data-label="Halaga">₱${price}</td>
                    <td data-label="Resibo"><img src="${order.receiptImage}" class="receipt-preview" onclick="viewImage('${order.receiptImage}')"></td>
                    <td data-label="Status"><span class="status-badge ${order.status}">${order.status}</span></td>
                    <td data-label="Aksyon">
                        ${order.status === 'pending' ? `
                            <button class="btn-action btn-approve" onclick="updateStatus('${order.id}', 'approved')">Approve</button>
                            <button class="btn-action btn-reject" onclick="updateStatus('${order.id}', 'rejected')">Reject</button>
                        ` : 'Tapos na'}
                    </td>
                </tr>`;
        });
        document.getElementById('totalSales').innerText = "₱" + total.toLocaleString();
        document.getElementById('approvedCount').innerText = approved;
        document.getElementById('pendingCount').innerText = pending;
    }

    window.updateStatus = async (id, status) => {
        if (!confirm("Sigurado ka?")) return;
        await updateDoc(doc(db, "orders", id), { status: status });
    };

    window.viewImage = (src) => {
        document.getElementById('fullImg').src = src;
        document.getElementById('imgModal').style.display = 'block';
    };

    window.resetFilters = () => {
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
        renderTable(allOrders);
    };

    document.getElementById('startDate').addEventListener('change', () => renderTable(allOrders));
    document.getElementById('endDate').addEventListener('change', () => renderTable(allOrders));
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString();
</script>
</body>
</html>
