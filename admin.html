<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Salas ng Karunungan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ph-blue: #0038a8; --ph-red: #ce1126; --ph-gold: #fcd116; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--ph-blue); padding-bottom: 15px; margin-bottom: 25px; }
        h1 { margin: 0; color: var(--ph-blue); font-size: 1.8rem; }

        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; border-top: 5px solid var(--ph-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #666; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 700; color: var(--ph-blue); }

        /* Filters */
        .filter-section { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.85rem; font-weight: 600; }
        input[type="date"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; }
        .btn-reset { background: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--ph-blue); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .receipt-preview { width: 60px; height: 40px; object-fit: cover; cursor: pointer; border-radius: 4px; border: 1px solid #ddd; }
        
        .status-badge { padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d4edda; color: #155724; }
        .rejected { background: #f8d7da; color: #721c24; }

        .btn-action { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }

        #imgModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); text-align: center; }
        #fullImg { max-width: 90%; max-height: 80%; margin-top: 50px; border: 5px solid white; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-flex">
        <h1>Dashboard ni Ma'am April</h1>
        <div id="currentDate" style="font-weight: 600; color: #666;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Kabuuang Benta</h3>
            <p id="totalSales">₱0.00</p>
        </div>
        <div class="stat-card">
            <h3>Approved Orders</h3>
            <p id="approvedCount">0</p>
        </div>
        <div class="stat-card" style="border-top-color: var(--ph-red);">
            <h3>Pending</h3>
            <p id="pendingCount">0</p>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Mula Petsa:</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>Hanggang Petsa:</label>
            <input type="date" id="endDate">
        </div>
        <button class="btn-reset" onclick="resetFilters()">I-reset Filter</button>
        <p style="margin: 0 0 5px 10px; font-size: 0.8rem; color: #888;">*Base sa petsa ng pag-approve</p>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Petsa ng Order</th>
                    <th>Email ng Guro</th>
                    <th>Materyales</th>
                    <th>Halaga</th>
                    <th>Resibo</th>
                    <th>Status</th>
                    <th>Aksyon</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                </tbody>
        </table>
    </div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <p style="color:white; margin-top:20px;">I-click kahit saan para isara</p>
    <img id="fullImg" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFAYSZFOqIcpt5fsLG7HZrA7PXTAdiUEE",
        authDomain: "teacher-2a27f.firebaseapp.com",
        projectId: "teacher-2a27f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allOrders = []; // Listahan para sa filtering

    // Listahan ng presyo (I-match ito sa main website mo)
    const priceList = {
        "Ibong Adarna Guide": 150,
        "Florante at Laura Guide": 200,
        "Gramatika Module": 120
    };

    // 1. REAL-TIME DATA FETCHING
    const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allOrders = [];
        snapshot.forEach(doc => {
            allOrders.push({ id: doc.id, ...doc.data() });
        });
        renderTable(allOrders);
    });

    // 2. RENDER TABLE FUNCTION
    function renderTable(orders) {
        const body = document.getElementById('ordersBody');
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        
        body.innerHTML = "";
        let total = 0;
        let approvedCount = 0;
        let pendingCount = 0;

        orders.forEach(order => {
            const orderDate = order.timestamp ? new Date(order.timestamp.seconds * 1000) : new Date();
            const orderDateStr = orderDate.toISOString().split('T')[0];
            const price = priceList[order.productName] || 0;

            // Date Filter Logic (Base sa timestamp ng order sa ngayon)
            if (start && orderDateStr < start) return;
            if (end && orderDateStr > end) return;

            // Stats Logic
            if (order.status === 'approved') {
                total += price;
                approvedCount++;
            } else if (order.status === 'pending') {
                pendingCount++;
            }

            const row = `
                <tr>
                    <td>${orderDate.toLocaleDateString()}</td>
                    <td><b>${order.customerEmail}</b></td>
                    <td>${order.productName}</td>
                    <td>₱${price}</td>
                    <td><img src="${order.receiptImage}" class="receipt-preview" onclick="viewImage('${order.receiptImage}')"></td>
                    <td><span class="status-badge ${order.status}">${order.status}</span></td>
                    <td>
                        ${order.status === 'pending' ? `
                            <button class="btn-action btn-approve" onclick="updateStatus('${order.id}', 'approved')">Approve</button>
                            <button class="btn-action btn-reject" onclick="updateStatus('${order.id}', 'rejected')">Reject</button>
                        ` : `<span style="color:#999; font-size:0.8rem;">Tapos na</span>`}
                    </td>
                </tr>
            `;
            body.innerHTML += row;
        });

        // Update Stats UI
        document.getElementById('totalSales').innerText = "₱" + total.toLocaleString();
        document.getElementById('approvedCount').innerText = approvedCount;
        document.getElementById('pendingCount').innerText = pendingCount;
    }

    // 3. ACTIONS
    window.updateStatus = async (id, status) => {
        const confirmMsg = status === 'approved' ? "I-approve ang order na ito?" : "I-reject ang order?";
        if (!confirm(confirmMsg)) return;

        try {
            const ref = doc(db, "orders", id);
            await updateDoc(ref, { 
                status: status,
                approvedAt: new Date() // Nagdadagdag tayo ng field para sa history tracking
            });
        } catch (e) { alert("Error: " + e.message); }
    };

    window.viewImage = (src) => {
        document.getElementById('fullImg').src = src;
        document.getElementById('imgModal').style.display = 'block';
    };

    window.resetFilters = () => {
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
        renderTable(allOrders);
    };

    // Listeners para sa Date Inputs
    document.getElementById('startDate').addEventListener('change', () => renderTable(allOrders));
    document.getElementById('endDate').addEventListener('change', () => renderTable(allOrders));

    // Display Current Date
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tl-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

</script>

</body>
</html>
