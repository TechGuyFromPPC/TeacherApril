<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Salas ng Karunungan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --ph-blue: #0038a8; --ph-red: #ce1126; --ph-gold: #fcd116; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--ph-blue); padding-bottom: 15px; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; color: var(--ph-blue); font-size: 1.6rem; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; border-top: 5px solid var(--ph-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5rem; font-weight: 700; color: var(--ph-blue); }

        /* Filter Section */
        .filter-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 130px; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; color: #555; }
        input[type="date"] { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.9rem; }
        .btn-reset { background: #6c757d; color: white; border: none; padding: 11px; border-radius: 6px; cursor: pointer; font-weight: 600; flex: 0.5; min-width: 100px; }

        /* Table Design */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--ph-blue); color: white; padding: 12px; text-align: left; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .receipt-preview { width: 50px; height: 50px; object-fit: cover; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; transition: 0.2s; }
        .receipt-preview:hover { transform: scale(1.1); }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d4edda; color: #155724; }
        .rejected { background: #f8d7da; color: #721c24; }

        /* Buttons Group */
        .action-group { display: flex; gap: 8px; width: 100%; }
        .btn-action { flex: 1; padding: 10px 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: 0.2s; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-action:active { transform: scale(0.95); }

        /* Mobile View Breakdown */
        @media screen and (max-width: 768px) {
            thead { display: none; }
            tr { display: block; margin-bottom: 20px; border: 1px solid #eee; border-radius: 12px; padding: 15px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f9f9f9; padding: 10px 0; text-align: right; }
            td::before { content: attr(data-label); font-weight: 700; color: var(--ph-blue); font-size: 0.75rem; text-transform: uppercase; }
            td:last-child { border-bottom: none; padding-top: 15px; }
            .action-group { margin-top: 5px; }
            .receipt-preview { width: 80px; height: 50px; }
        }

        /* Full Image Modal */
        #imgModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; box-sizing: border-box; }
        #fullImg { max-width: 100%; max-height: 85%; object-fit: contain; margin: 40px auto; display: block; border: 3px solid white; }
        .close-txt { color: white; text-align: center; font-size: 0.8rem; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-flex">
        <h1>Admin Dashboard</h1>
        <div id="currentDate" style="font-size: 0.8rem; font-weight: 600; color: #888;"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Sales</h3>
            <p id="totalSales">₱0</p>
        </div>
        <div class="stat-card">
            <h3>Approved</h3>
            <p id="approvedCount">0</p>
        </div>
        <div class="stat-card" style="border-top-color: var(--ph-red);">
            <h3>Pending</h3>
            <p id="pendingCount">0</p>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Mula Petsa:</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>Hanggang Petsa:</label>
            <input type="date" id="endDate">
        </div>
        <button class="btn-reset" onclick="resetFilters()">Reset Filter</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Petsa</th>
                    <th>Email ng Guro</th>
                    <th>Materyales</th>
                    <th>Halaga</th>
                    <th>Resibo</th>
                    <th>Status</th>
                    <th>Aksyon</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                </tbody>
        </table>
    </div>
</div>

<div id="imgModal" onclick="this.style.display='none'">
    <div class="close-txt">I-click kahit saan para isara</div>
    <img id="fullImg" src="">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFAYSZFOqIcpt5fsLG7HZrA7PXTAdiUEE",
        authDomain: "teacher-2a27f.firebaseapp.com",
        projectId: "teacher-2a27f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // I-match ito sa products sa index.html
    const priceList = { 
        "Ibong Adarna Guide": 150, 
        "Florante at Laura Guide": 200, 
        "Gramatika Module": 120 
    };

    let allOrders = [];

    // Real-time Database Listener
    const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allOrders = [];
        snapshot.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
        renderTable(allOrders);
    });

    function renderTable(orders) {
        const body = document.getElementById('ordersBody');
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        
        body.innerHTML = "";
        let total = 0, approved = 0, pending = 0;

        orders.forEach(order => {
            const dateObj = order.timestamp ? new Date(order.timestamp.seconds * 1000) : new Date();
            const dateStr = dateObj.toISOString().split('T')[0];
            const price = priceList[order.productName] || 0;

            // Apply Date Filter
            if (start && dateStr < start) return;
            if (end && dateStr > end) return;

            // Stats Logic
            if (order.status === 'approved') { 
                total += price; 
                approved++; 
            } else if (order.status === 'pending') { 
                pending++; 
            }

            body.innerHTML += `
                <tr>
                    <td data-label="Petsa">${dateObj.toLocaleDateString()}</td>
                    <td data-label="Email"><b>${order.customerEmail}</b></td>
                    <td data-label="Item">${order.productName}</td>
                    <td data-label="Halaga">₱${price}</td>
                    <td data-label="Resibo"><img src="${order.receiptImage}" class="receipt-preview" onclick="viewImage('${order.receiptImage}')"></td>
                    <td data-label="Status"><span class="status-badge ${order.status}">${order.status}</span></td>
                    <td data-label="Aksyon">
                        ${order.status === 'pending' ? `
                            <div class="action-group">
                                <button class="btn-action btn-approve" onclick="updateStatus('${order.id}', 'approved')">Approve</button>
                                <button class="btn-action btn-reject" onclick="updateStatus('${order.id}', 'rejected')">Reject</button>
                            </div>
                        ` : `<span style="color:#28a745; font-weight:700;">✓ Tapos na</span>`}
                    </td>
                </tr>`;
        });

        document.getElementById('totalSales').innerText = "₱" + total.toLocaleString();
        document.getElementById('approvedCount').innerText = approved;
        document.getElementById('pendingCount').innerText = pending;
    }

    window.updateStatus = async (id, newStatus) => {
        if (!confirm(`I-${newStatus} ang order na ito?`)) return;
        try {
            await updateDoc(doc(db, "orders", id), { status: newStatus });
        } catch (e) { alert("Error: " + e.message); }
    };

    window.viewImage = (src) => {
        document.getElementById('fullImg').src = src;
        document.getElementById('imgModal').style.display = 'block';
    };

    window.resetFilters = () => {
        document.getElementById('startDate').value = "";
        document.getElementById('endDate').value = "";
        renderTable(allOrders);
    };

    document.getElementById('startDate').addEventListener('change', () => renderTable(allOrders));
    document.getElementById('endDate').addEventListener('change', () => renderTable(allOrders));
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tl-PH', { weekday:'long', month:'long', day:'numeric' });
</script>

</body>
</html>
